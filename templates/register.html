{% extends "base.html" %}

{% block css %}
<!-- Reutilizamos el CSS de autenticación para mantener la prolijidad -->
<link rel="stylesheet" href="{{ url_for('static', path='css/pages/auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Crear Cuenta</h2>
            <p>Únete al Hotel Triple Frontera y gestiona tus estadías</p>
        </div>

        <form action="/register" method="POST" class="auth-form">
            <!-- Nombre y Apellido en dos columnas si quieres, o uno bajo otro para prolijidad -->
            <div class="form-group">
                <label for="full_name">Nombre Completo</label>
                <input type="text" id="full_name" name="full_name" placeholder="Juan Pérez" required>
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirmar Contraseña</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Repite tu contraseña" required>
            </div>

            <!-- Términos y condiciones con el estilo de checkbox que ya definimos -->
            <div class="auth-options">
                <label class="remember-me">
                    <input type="checkbox" name="terms" required> Acepto los términos y condiciones
                </label>
            </div>

            <button type="submit" class="btn-submit">Registrarse</button>
        </form>

        <div class="auth-footer">
            <p>¿Ya tienes una cuenta? <a href="{{ url_for('login_user') }}">Inicia sesión aquí</a></p>
        </div>
    </div>
</div>
{% endblock %}
